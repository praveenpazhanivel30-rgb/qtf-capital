<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX FUTURES | Elite Funded Futures Traders</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04070D;
  --bg2: #070C14;
  --bg3: #0B1220;
  --bg4: #0F1929;
  --cyan: #00E5FF;
  --cyan2: #00B8CC;
  --blue: #1565C0;
  --white: #E8EDF5;
  --grey: #6B7A99;
  --green: #00E676;
  --red: #FF1744;
  --orange: #FF6D00;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}

/* SCANLINES */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,229,255,0.015) 2px,
    rgba(0,229,255,0.015) 4px
  );
  pointer-events:none;
  z-index:999;
}

/* NAV */
nav {
  position:fixed;
  top:0; left:0; right:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background: rgba(4,7,13,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,229,255,0.08);
}

.logo {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:26px;
  letter-spacing:6px;
  color:var(--white);
  text-decoration:none;
}
.logo span { color:var(--cyan); }

.nav-links { display:flex; gap:36px; list-style:none; align-items:center; }
.nav-links a {
  color:var(--grey);
  text-decoration:none;
  font-size:12px;
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  transition:color 0.3s;
  font-family:'Barlow Condensed',sans-serif;
}
.nav-links a:hover { color:var(--cyan); }

.nav-cta {
  background:transparent !important;
  border:1px solid var(--cyan) !important;
  color:var(--cyan) !important;
  padding:8px 24px;
  transition: all 0.3s !important;
}
.nav-cta:hover { background:var(--cyan) !important; color:var(--bg) !important; }

/* HERO */
.hero {
  min-height:100vh;
  display:flex;
  align-items:center;
  padding:100px 60px 60px;
  position:relative;
  overflow:hidden;
}

.hero-bg {
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 60% 60% at 70% 50%, rgba(0,229,255,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(21,101,192,0.08) 0%, transparent 60%);
}

.hero-lines {
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(ellipse 70% 70% at 70% 50%, black, transparent);
}

.hero-left { max-width:620px; position:relative; z-index:2; }

.hero-badge {
  display:inline-flex;
  align-items:center;
  gap:8px;
  border:1px solid rgba(0,229,255,0.3);
  padding:6px 16px;
  margin-bottom:32px;
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  letter-spacing:3px;
  color:var(--cyan);
  text-transform:uppercase;
  animation: fadeUp 0.6s ease both;
}

.badge-dot {
  width:6px; height:6px;
  background:var(--cyan);
  border-radius:50%;
  animation: blink 1.5s ease infinite;
}

@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0; }
}

.hero h1 {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:clamp(60px,9vw,130px);
  line-height:0.88;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:28px;
  animation: fadeUp 0.6s ease 0.15s both;
}

.hero h1 .cyan { color:var(--cyan); }
.hero h1 .outline {
  -webkit-text-stroke:1px rgba(255,255,255,0.3);
  color:transparent;
}

.hero-desc {
  font-size:16px;
  color:var(--grey);
  line-height:1.8;
  max-width:480px;
  margin-bottom:44px;
  animation: fadeUp 0.6s ease 0.3s both;
}

.hero-actions {
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  animation: fadeUp 0.6s ease 0.45s both;
}

.btn-main {
  background:var(--cyan);
  color:var(--bg);
  padding:15px 40px;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:14px;
  letter-spacing:3px;
  text-transform:uppercase;
  text-decoration:none;
  transition:all 0.3s;
  position:relative;
  clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
}
.btn-main:hover { background:var(--white); transform:translateY(-2px); }

.btn-ghost {
  border:1px solid rgba(255,255,255,0.15);
  color:var(--white);
  padding:15px 40px;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:600;
  font-size:14px;
  letter-spacing:3px;
  text-transform:uppercase;
  text-decoration:none;
  transition:all 0.3s;
}
.btn-ghost:hover { border-color:var(--cyan); color:var(--cyan); }

/* FUTURES DASHBOARD - RIGHT SIDE */
.hero-dashboard {
  position:absolute;
  right:60px;
  top:50%;
  transform:translateY(-50%);
  width:420px;
  animation: fadeUp 0.8s ease 0.5s both;
  z-index:2;
}

.dashboard-header {
  background:var(--bg3);
  border:1px solid rgba(0,229,255,0.15);
  border-bottom:none;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.dash-title {
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  letter-spacing:3px;
  color:var(--cyan);
  text-transform:uppercase;
}

.dash-live {
  display:flex;
  align-items:center;
  gap:6px;
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  color:var(--green);
  letter-spacing:2px;
}

.futures-table {
  background:var(--bg2);
  border:1px solid rgba(0,229,255,0.1);
  width:100%;
}

.futures-row {
  display:grid;
  grid-template-columns:1fr 1.2fr 0.8fr 0.8fr;
  padding:12px 20px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  align-items:center;
  transition:background 0.2s;
}
.futures-row:hover { background:rgba(0,229,255,0.03); }

.futures-row.header {
  background:rgba(0,229,255,0.05);
  padding:8px 20px;
}

.futures-row.header span {
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  color:var(--grey);
  text-transform:uppercase;
}

.fut-contract {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:15px;
  color:var(--white);
}
.fut-name {
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  color:var(--grey);
  margin-top:2px;
}

.fut-price {
  font-family:'Share Tech Mono',monospace;
  font-size:14px;
  color:var(--white);
  text-align:right;
}

.fut-change {
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  text-align:right;
}

.up { color:var(--green); }
.dn { color:var(--red); }

.fut-vol {
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  color:var(--grey);
  text-align:right;
}

.dash-footer {
  background:var(--bg3);
  border:1px solid rgba(0,229,255,0.1);
  border-top:none;
  padding:12px 20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.dash-stat-label {
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  letter-spacing:1px;
  color:var(--grey);
  text-transform:uppercase;
}
.dash-stat-val {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:20px;
  color:var(--cyan);
  margin-top:2px;
}

/* TICKER */
.ticker-wrap {
  background:var(--bg3);
  border-top:1px solid rgba(0,229,255,0.1);
  border-bottom:1px solid rgba(0,229,255,0.1);
  padding:12px 0;
  overflow:hidden;
}

.ticker-track {
  display:flex;
  gap:48px;
  animation:tickerMove 35s linear infinite;
  width:max-content;
}

.tick-item {
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;
}

.tick-sym {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:13px;
  letter-spacing:1px;
  color:var(--white);
}

.tick-price {
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  color:var(--grey);
}

.tick-div { color:rgba(0,229,255,0.2); font-size:10px; }

@keyframes tickerMove {
  from { transform:translateX(0); }
  to { transform:translateX(-50%); }
}

/* STATS BAR */
.stats-bar {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  background:var(--bg2);
  border-bottom:1px solid rgba(0,229,255,0.08);
}

.stat-item {
  padding:48px 40px;
  border-right:1px solid rgba(0,229,255,0.08);
  position:relative;
  overflow:hidden;
  transition:background 0.3s;
}
.stat-item:last-child { border-right:none; }
.stat-item:hover { background:var(--bg3); }

.stat-item::before {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:2px;
  background:var(--cyan);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform 0.4s;
}
.stat-item:hover::before { transform:scaleX(1); }

.stat-n {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:56px;
  color:var(--cyan);
  line-height:1;
  margin-bottom:6px;
}

.stat-l {
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--grey);
}

/* INSTRUMENTS */
.instruments {
  padding:120px 60px;
  background:var(--bg);
}

.section-label {
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  letter-spacing:4px;
  color:var(--cyan);
  text-transform:uppercase;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:12px;
}
.section-label::after { content:''; flex:1; height:1px; background:rgba(0,229,255,0.15); max-width:80px; }

.section-h {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:clamp(40px,6vw,80px);
  text-transform:uppercase;
  line-height:0.9;
  margin-bottom:70px;
  letter-spacing:1px;
}

.instruments-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
  background:rgba(0,229,255,0.06);
  max-width:1100px;
}

.instr-card {
  background:var(--bg2);
  padding:40px 36px;
  transition:background 0.3s;
  position:relative;
  overflow:hidden;
}
.instr-card:hover { background:var(--bg3); }

.instr-card::before {
  content:'';
  position:absolute;
  top:0; left:0;
  height:2px; width:0;
  background:var(--cyan);
  transition:width 0.4s;
}
.instr-card:hover::before { width:100%; }

.instr-icon {
  font-size:36px;
  margin-bottom:20px;
  display:block;
}

.instr-name {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:22px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--white);
  margin-bottom:8px;
}

.instr-ticker {
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  color:var(--cyan);
  letter-spacing:2px;
  margin-bottom:16px;
}

.instr-desc {
  font-size:13px;
  color:var(--grey);
  line-height:1.7;
}

.instr-specs {
  margin-top:20px;
  display:flex;
  gap:16px;
}

.instr-spec {
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  color:var(--grey);
  background:rgba(0,229,255,0.05);
  border:1px solid rgba(0,229,255,0.1);
  padding:4px 10px;
  letter-spacing:1px;
}

/* PLANS */
.plans {
  padding:120px 60px;
  background:var(--bg2);
}

.plans-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
  background:rgba(0,229,255,0.06);
  max-width:1100px;
}

.plan {
  background:var(--bg);
  padding:48px 40px;
  position:relative;
}

.plan.featured {
  background:var(--bg3);
  border-top:2px solid var(--cyan);
}

.plan-tag {
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  letter-spacing:3px;
  color:var(--cyan);
  text-transform:uppercase;
  margin-bottom:8px;
}

.plan-size {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:60px;
  line-height:1;
  margin-bottom:4px;
}

.plan-sub {
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  color:var(--grey);
  letter-spacing:2px;
  margin-bottom:36px;
  padding-bottom:28px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.plan-fee {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:28px;
  color:var(--cyan);
  margin-bottom:4px;
}

.plan-feesub {
  font-size:12px;
  color:var(--grey);
  margin-bottom:32px;
}

.plan-rules { list-style:none; margin-bottom:36px; }
.plan-rules li {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:13px;
}
.plan-rules li .rule-label { color:var(--grey); }
.plan-rules li .rule-val { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--white); }
.plan-rules li .rule-val.cyan { color:var(--cyan); }

.popular-badge {
  position:absolute;
  top:20px; right:20px;
  background:var(--cyan);
  color:var(--bg);
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  padding:4px 12px;
  text-transform:uppercase;
  font-weight:700;
}

/* HOW */
.how {
  padding:120px 60px;
  background:var(--bg);
}

.how-steps {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:0;
  position:relative;
  max-width:1100px;
}

.how-line {
  position:absolute;
  top:36px;
  left:12.5%;
  width:75%;
  height:1px;
  background:linear-gradient(to right, transparent, var(--cyan), transparent);
  opacity:0.2;
}

.how-step {
  padding:0 20px;
  text-align:center;
  position:relative;
}

.step-circle {
  width:72px; height:72px;
  border:1px solid rgba(0,229,255,0.3);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 28px;
  position:relative;
  z-index:1;
  background:var(--bg);
  transition:all 0.4s;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:28px;
  color:var(--cyan);
}
.step-circle:hover { background:var(--cyan); color:var(--bg); border-color:var(--cyan); }

.how-step h3 {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:20px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:12px;
}

.how-step p {
  font-size:13px;
  color:var(--grey);
  line-height:1.7;
}

/* RULES */
.rules-section {
  padding:120px 60px;
  background:var(--bg2);
}

.rules-layout {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  max-width:1100px;
  align-items:start;
}

.rules-left h2 { margin-bottom:24px; }

.rules-left p {
  font-size:15px;
  color:var(--grey);
  line-height:1.8;
  margin-bottom:36px;
}

.rules-highlight {
  background:var(--bg3);
  border-left:3px solid var(--cyan);
  padding:24px 28px;
  font-family:'Share Tech Mono',monospace;
  font-size:13px;
  color:var(--cyan);
  line-height:1.8;
}

.rules-table { width:100%; }
.rule-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.rule-name {
  font-size:14px;
  color:var(--grey);
  display:flex;
  align-items:center;
  gap:10px;
}
.rule-name::before {
  content:'//';
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  color:rgba(0,229,255,0.4);
}
.rule-value {
  font-family:'Share Tech Mono',monospace;
  font-size:13px;
  color:var(--white);
  background:rgba(0,229,255,0.06);
  border:1px solid rgba(0,229,255,0.12);
  padding:4px 14px;
}
.rule-value.green { color:var(--green); border-color:rgba(0,230,118,0.2); background:rgba(0,230,118,0.05); }

/* PAYOUTS */
.payouts {
  padding:120px 60px;
  background:var(--bg);
}

.payout-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:2px;
  background:rgba(0,229,255,0.06);
  max-width:1100px;
  margin-bottom:60px;
}

.payout-card {
  background:var(--bg2);
  padding:36px 28px;
  text-align:center;
  transition:background 0.3s;
}
.payout-card:hover { background:var(--bg3); }

.payout-icon { font-size:32px; margin-bottom:16px; }

.payout-label {
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  letter-spacing:2px;
  color:var(--grey);
  text-transform:uppercase;
  margin-bottom:8px;
}

.payout-val {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:36px;
  color:var(--cyan);
}

/* TESTIMONIALS */
.testi {
  padding:120px 60px;
  background:var(--bg2);
}

.testi-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
  background:rgba(0,229,255,0.06);
  max-width:1100px;
}

.testi-card {
  background:var(--bg);
  padding:40px 36px;
}

.testi-stars {
  color:var(--cyan);
  font-size:12px;
  letter-spacing:4px;
  margin-bottom:20px;
}

.testi-quote {
  font-size:14px;
  color:var(--grey);
  line-height:1.9;
  margin-bottom:28px;
  font-style:italic;
}

.testi-person { display:flex; align-items:center; gap:12px; }

.testi-ava {
  width:42px; height:42px;
  background:linear-gradient(135deg, var(--cyan), var(--blue));
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:16px;
  color:var(--bg);
  clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}

.testi-info-name { font-weight:500; font-size:14px; }
.testi-info-role { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--grey); letter-spacing:1px; margin-top:2px; }

/* CTA */
.cta {
  padding:160px 60px;
  text-align:center;
  position:relative;
  overflow:hidden;
  background:var(--bg);
}

.cta::before {
  content:'';
  position:absolute;
  width:900px; height:900px;
  background:radial-gradient(circle, rgba(0,229,255,0.05) 0%, transparent 65%);
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  animation:pulse 5s ease infinite;
}

@keyframes pulse {
  0%,100% { transform:translate(-50%,-50%) scale(1); }
  50% { transform:translate(-50%,-50%) scale(1.15); }
}

.cta h2 {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:clamp(50px,9vw,120px);
  text-transform:uppercase;
  line-height:0.9;
  letter-spacing:1px;
  margin-bottom:28px;
  position:relative;
}

.cta h2 .cyan { color:var(--cyan); }

.cta p {
  font-size:16px;
  color:var(--grey);
  max-width:440px;
  margin:0 auto 48px;
  line-height:1.7;
  position:relative;
}

/* FOOTER */
footer {
  background:var(--bg2);
  border-top:1px solid rgba(0,229,255,0.08);
  padding:70px 60px 40px;
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr;
  gap:60px;
}

.footer-logo-area p {
  font-size:13px;
  color:var(--grey);
  line-height:1.8;
  margin-top:16px;
  max-width:280px;
}

footer h5 {
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  letter-spacing:3px;
  color:var(--cyan);
  text-transform:uppercase;
  margin-bottom:20px;
}

footer ul { list-style:none; }
footer ul li { margin-bottom:10px; }
footer ul a {
  color:var(--grey);
  text-decoration:none;
  font-size:13px;
  transition:color 0.3s;
}
footer ul a:hover { color:var(--white); }

.footer-bottom {
  background:var(--bg);
  border-top:1px solid rgba(255,255,255,0.04);
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.footer-bottom p {
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  color:var(--grey);
  letter-spacing:1px;
}

/* FADE IN */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(28px); }
  to { opacity:1; transform:translateY(0); }
}

.fi { opacity:0; transform:translateY(24px); transition:all 0.7s ease; }
.fi.vis { opacity:1; transform:translateY(0); }
