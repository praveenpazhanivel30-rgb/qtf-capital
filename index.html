<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QTF Capital — Funded Futures Trading</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@200;300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{
  --g:#C9A84C;--g2:#F5D07A;--g3:#8A6020;
    --glow:0 0 20px rgba(201,168,76,0.8),0 0 50px rgba(201,168,76,0.35);
      --glow2:0 0 10px rgba(201,168,76,0.6);
        --glow3:0 0 30px rgba(201,168,76,0.15);
          /* LIGHTER background values */
            --black:#0A0A14;--d1:#0F0F1C;--d2:#141424;--d3:#1A1A2E;
              --green:#00FF88;--red:#FF3B5C;
                --border:rgba(201,168,76,0.22);--border2:rgba(201,168,76,0.5);--border3:rgba(201,168,76,0.7);
                  --text:#E0D5B8;--dim:#7A7060;
                    /* plan box backgrounds */
                      --pb:#12121F;--pb-hot:#171510;
                      }
                      *{margin:0;padding:0;box-sizing:border-box;}
                      html{scroll-behavior:smooth;}
                      body{background:var(--black);color:var(--text);font-family:'Exo 2',sans-serif;overflow-x:hidden;cursor:none;}

                      #cur{position:fixed;width:8px;height:8px;background:var(--g);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:var(--glow);}
                      #cur2{position:fixed;width:30px;height:30px;border:1px solid var(--g);pointer-events:none;z-index:99998;transform:translate(-50%,-50%) rotate(45deg);transition:all .12s ease;opacity:.8;}

                      #cv{position:fixed;inset:0;z-index:0;}

                      /* lighter scanlines */
                      body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:2;}
                      /* lighter vignette */
                      body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(10,10,20,.6) 100%);pointer-events:none;z-index:1;}

                      /* NAV */
                      nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1.2rem 4%;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid transparent;transition:all .4s;}
                      nav.on{background:rgba(10,10,20,.93);border-color:var(--border);backdrop-filter:blur(18px);}
                      .logo{display:flex;align-items:center;gap:1rem;}
                      .logo-hex{width:44px;height:44px;}
                      .logo-hex svg{width:100%;height:100%;filter:drop-shadow(0 0 10px var(--g));}
                      .l1{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:800;color:var(--g);letter-spacing:.18em;text-shadow:var(--glow2);}
                      .l2{font-size:.55rem;letter-spacing:.4em;color:var(--dim);font-family:'Share Tech Mono',monospace;display:block;margin-top:1px;}
                      .nav-links{display:flex;gap:2.5rem;list-style:none;}
                      .nav-links a{color:var(--dim);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;font-family:'Share Tech Mono',monospace;transition:all .3s;}
                      .nav-links a::before{content:'[';opacity:0;transition:.3s;color:var(--g);}
                      .nav-links a::after{content:']';opacity:0;transition:.3s;color:var(--g);}
                      .nav-links a:hover{color:var(--g);text-shadow:var(--glow2);}
                      .nav-links a:hover::before,.nav-links a:hover::after{opacity:1;}
                      .nav-cta{font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;letter-spacing:.2em;padding:.6rem 1.5rem;background:transparent;border:1px solid var(--g);color:var(--g);cursor:none;transition:all .3s;text-transform:uppercase;position:relative;overflow:hidden;}
                      .nav-cta::before{content:'';position:absolute;inset:0;background:var(--g);transform:translateX(-100%);transition:.3s;z-index:-1;}
                      .nav-cta:hover::before{transform:translateX(0);}
                      .nav-cta:hover{color:var(--black);}

                      /* HERO */
                      .hero{min-height:100vh;display:flex;align-items:center;position:relative;z-index:10;padding:0 4%;}
                      .hero-inner{width:100%;max-width:1300px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;}
                      .hud-box{position:relative;padding:3rem;}
                      .hud-box::before,.hud-box::after{content:'';position:absolute;width:28px;height:28px;border-color:var(--g);border-style:solid;}
                      .hud-box::before{top:0;left:0;border-width:2px 0 0 2px;box-shadow:-4px -4px 14px rgba(201,168,76,.4);}
                      .hud-box::after{bottom:0;right:0;border-width:0 2px 2px 0;box-shadow:4px 4px 14px rgba(201,168,76,.4);}
                      .hero-tag{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--g);letter-spacing:.3em;margin-bottom:1.5rem;display:flex;align-items:center;gap:.8rem;opacity:0;animation:fadeUp .7s .2s forwards;}
                      .hero-tag::before{content:'';width:32px;height:1px;background:var(--g);box-shadow:var(--glow2);}
                      .hero-h1{font-family:'Orbitron',monospace;font-size:clamp(2.2rem,4.5vw,3.8rem);font-weight:900;line-height:1.1;letter-spacing:.02em;margin-bottom:1.5rem;opacity:0;animation:fadeUp .7s .4s forwards;}
                      .hero-h1 .la{display:block;color:var(--text);}
                      .hero-h1 .lb{display:block;color:var(--g);text-shadow:var(--glow);position:relative;}
                      .hero-h1 .lb::after{content:attr(data-text);position:absolute;left:2px;top:2px;color:rgba(255,59,92,.35);clip-path:inset(30% 0 50% 0);animation:glitch1 4s infinite;}
                      .hero-h1 .lc{display:block;color:var(--text);-webkit-text-stroke:1px rgba(201,168,76,.3);}
                      .hero-desc{font-size:.92rem;color:var(--dim);line-height:1.9;margin-bottom:2.5rem;font-weight:300;letter-spacing:.04em;opacity:0;animation:fadeUp .7s .6s forwards;}
                      .hero-btns{display:flex;gap:1rem;flex-wrap:wrap;opacity:0;animation:fadeUp .7s .8s forwards;}
                      .btn-main{font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;letter-spacing:.18em;padding:.9rem 2.2rem;background:linear-gradient(135deg,var(--g3),var(--g));color:var(--black);border:none;cursor:none;transition:all .3s;text-decoration:none;display:inline-block;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));text-transform:uppercase;}
                      .btn-main:hover{background:linear-gradient(135deg,var(--g),var(--g2));box-shadow:var(--glow);transform:scale(1.03);}
                      .btn-out{font-family:'Orbitron',monospace;font-size:.65rem;font-weight:600;letter-spacing:.15em;padding:.9rem 2.2rem;background:transparent;color:var(--g);border:1px solid var(--border2);cursor:none;transition:all .3s;text-decoration:none;display:inline-block;text-transform:uppercase;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}
                      .btn-out:hover{border-color:var(--g);box-shadow:var(--glow2);}

                      /* TERMINAL */
                      .terminal{background:rgba(10,10,20,.85);border:1px solid var(--border2);overflow:hidden;box-shadow:0 0 50px rgba(201,168,76,.12),inset 0 0 30px rgba(0,0,0,.4);opacity:0;animation:fadeUp .9s .5s forwards;backdrop-filter:blur(8px);}
                      .term-bar{background:rgba(20,20,36,.9);padding:.8rem 1.2rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid var(--border);}
                      .term-dot{width:8px;height:8px;border-radius:50%;}
                      .term-title{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--dim);letter-spacing:.15em;margin-left:auto;}
                      .term-body{padding:1.5rem;}
                      .live-row{display:flex;justify-content:space-between;align-items:center;padding:.65rem 0;border-bottom:1px solid rgba(201,168,76,.07);font-family:'Share Tech Mono',monospace;font-size:.75rem;}
                      .live-row:last-child{border-bottom:none;}
                      .lr-sym{color:var(--g);letter-spacing:.1em;}
                      .lr-price{color:var(--text);}
                      .lr-chg.up{color:var(--green);}
                      .lr-chg.dn{color:var(--red);}
                      .lr-bar{width:60px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
                      .lr-fill{height:100%;border-radius:2px;}

                      /* METRICS */
                      .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);position:relative;z-index:10;}
                      .metric{background:var(--d1);padding:2rem 1.5rem;text-align:center;position:relative;overflow:hidden;transition:background .3s;}
                      .metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--g),transparent);transform:scaleX(0);transition:.4s;}
                      .metric:hover{background:var(--d2);}
                      .metric:hover::before{transform:scaleX(1);}
                      .m-val{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:800;color:var(--g);display:block;text-shadow:var(--glow2);line-height:1;}
                      .m-label{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--dim);letter-spacing:.25em;margin-top:.6rem;display:block;text-transform:uppercase;}

                      /* TICKER */
                      .ticker{background:var(--d2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:.7rem 0;overflow:hidden;position:relative;z-index:10;}
                      .ticker::before,.ticker::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2;}
                      .ticker::before{left:0;background:linear-gradient(to right,var(--d2),transparent);}
                      .ticker::after{right:0;background:linear-gradient(to left,var(--d2),transparent);}
                      .tick-track{display:flex;animation:tickanim 28s linear infinite;white-space:nowrap;}
                      .ti{display:inline-flex;align-items:center;gap:.5rem;padding:0 2rem;font-family:'Share Tech Mono',monospace;font-size:.72rem;border-right:1px solid var(--border);}
                      .ti-s{color:var(--g);font-weight:700;}
                      .ti-p{color:var(--text);}
                      .ti-c.u{color:var(--green);}
                      .ti-c.d{color:var(--red);}

                      /* SECTIONS */
                      section{position:relative;z-index:10;}
                      .si{max-width:1220px;margin:0 auto;padding:0 4%;}
                      .stag{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--g);letter-spacing:.4em;text-transform:uppercase;display:flex;align-items:center;gap:.7rem;margin-bottom:1rem;}
                      .stag::before{content:'//';color:var(--g3);}
                      .sh{font-family:'Orbitron',monospace;font-size:clamp(1.6rem,3.5vw,2.6rem);font-weight:800;letter-spacing:.04em;line-height:1.2;margin-bottom:1.5rem;color:var(--text);}
                      .sh em{color:var(--g);font-style:normal;text-shadow:var(--glow2);}
                      .sdiv{width:80px;height:1px;background:linear-gradient(to right,var(--g),transparent);margin-bottom:3rem;box-shadow:var(--glow2);}
                      .rev{opacity:0;transform:translateY(28px);transition:all .65s ease;}
                      .rev.on{opacity:1;transform:translateY(0);}

                      /* FEATURES */
                      .features{padding:7rem 0;}
                      .feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
                      .feat{background:var(--d1);padding:2.5rem;position:relative;overflow:hidden;transition:all .3s;}
                      .feat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--g),transparent);transform:scaleX(0);transition:.4s;}
                      .feat:hover{background:var(--d2);}
                      .feat:hover::after{transform:scaleX(1);}
                      .feat-num{font-family:'Orbitron',monospace;font-size:.6rem;color:var(--g3);letter-spacing:.3em;margin-bottom:1.2rem;opacity:.7;}
                      .feat-icon{font-size:2rem;margin-bottom:1rem;}
                      .feat h3{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;color:var(--g);letter-spacing:.1em;margin-bottom:.8rem;text-transform:uppercase;}
                      .feat p{font-size:.82rem;color:var(--dim);line-height:1.85;font-weight:300;}

                      /* ═══════════════════════════════════════
                         EVALUATION PLANS — FULLY BOXED CARDS
                         ═══════════════════════════════════════ */
                         .eval{padding:7rem 0;background:var(--d1);}
                         .eval-tabs{display:flex;gap:0;margin-bottom:3rem;border:1px solid var(--border);}
                         .etab{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.2em;padding:.8rem 2rem;cursor:none;background:transparent;border:none;color:var(--dim);transition:all .3s;text-transform:uppercase;}
                         .etab.on{background:var(--g);color:var(--black);font-weight:700;}

                         .plans{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;/* gap instead of 1px for visible boxes */}

                         /* THE PLAN BOX — gold bordered card */
                         .plan{
                           background:var(--pb);
                             border:1px solid var(--border2);
                               border-radius:2px;
                                 padding:2rem 1.6rem;
                                   position:relative;
                                     transition:all .35s;
                                       display:flex;
                                         flex-direction:column;
                                           box-shadow:0 4px 24px rgba(0,0,0,.5), inset 0 0 20px rgba(201,168,76,.03);
                                           }
                                           /* corner accents on each plan box */
                                           .plan::before{
                                             content:'';position:absolute;top:-1px;left:-1px;
                                               width:20px;height:20px;
                                                 border-top:2px solid var(--g);
                                                   border-left:2px solid var(--g);
                                                     box-shadow:-2px -2px 8px rgba(201,168,76,.3);
                                                     }
                                                     .plan::after{
                                                       content:'';position:absolute;bottom:-1px;right:-1px;
                                                         width:20px;height:20px;
                                                           border-bottom:2px solid var(--g);
                                                             border-right:2px solid var(--g);
                                                               box-shadow:2px 2px 8px rgba(201,168,76,.3);
                                                               }
                                                               .plan:hover{
                                                                 border-color:var(--border3);
                                                                   background:var(--d2);
                                                                     transform:translateY(-4px);
                                                                       box-shadow:0 8px 40px rgba(0,0,0,.6), 0 0 30px rgba(201,168,76,.1);
                                                                       }

                                                                       /* FEATURED/HOT plan */
                                                                       .plan.hot{
                                                                         background:var(--pb-hot);
                                                                           border-color:var(--g);
                                                                             box-shadow:0 0 30px rgba(201,168,76,.2), 0 4px 24px rgba(0,0,0,.5), inset 0 0 30px rgba(201,168,76,.05);
                                                                             }
                                                                             .plan.hot::before,.plan.hot::after{border-color:var(--g2);}
                                                                             .plan.hot:hover{
                                                                               box-shadow:0 0 50px rgba(201,168,76,.3), 0 8px 40px rgba(0,0,0,.6);
                                                                                 transform:translateY(-6px);
                                                                                 }

                                                                                 .p-badge{
                                                                                   position:absolute;top:-13px;left:50%;transform:translateX(-50%);
                                                                                     font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:.25em;
                                                                                       padding:.28rem 1.2rem;background:var(--g);color:var(--black);
                                                                                         text-transform:uppercase;font-weight:700;white-space:nowrap;
                                                                                           box-shadow:0 0 14px rgba(201,168,76,.5);
                                                                                           }
                                                                                           .p-size{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;color:var(--g);text-shadow:var(--glow2);line-height:1;}
                                                                                           .p-sub{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--dim);letter-spacing:.2em;margin:4px 0 1rem;}
                                                                                           .p-price{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:800;color:var(--text);margin-bottom:.25rem;}
                                                                                           .p-note{font-size:.72rem;color:var(--dim);margin-bottom:0;padding-bottom:1.2rem;border-bottom:1px solid var(--border);line-height:1.6;}

                                                                                           /* RULES TABLE inside plan box */
                                                                                           .p-rules{list-style:none;margin:1rem 0 1.5rem;flex:1;}
                                                                                           .p-rules li{
                                                                                             display:flex;justify-content:space-between;align-items:center;
                                                                                               padding:.48rem .6rem;
                                                                                                 border-bottom:1px solid rgba(201,168,76,.06);
                                                                                                   font-size:.74rem;
                                                                                                     transition:background .2s;
                                                                                                     }
                                                                                                     .p-rules li:hover{background:rgba(201,168,76,.04);}
                                                                                                     .p-rules li:last-child{border-bottom:none;}
                                                                                                     .rl{color:var(--dim);font-family:'Share Tech Mono',monospace;}
                                                                                                     .rv{font-family:'Share Tech Mono',monospace;color:var(--g);text-align:right;}
                                                                                                     .rv.ok{color:var(--green);}
                                                                                                     .rv.w{color:#FFB800;}
                                                                                                     .rv.no{color:var(--red);}

                                                                                                     /* inner divider line in rules */
                                                                                                     .rule-divider{
                                                                                                       font-family:'Share Tech Mono',monospace;font-size:.58rem;
                                                                                                         color:var(--g3);letter-spacing:.2em;
                                                                                                           padding:.5rem .6rem .3rem;
                                                                                                             border-top:1px solid var(--border);
                                                                                                               margin-top:.3rem;
                                                                                                                 list-style:none;
                                                                                                                 }

                                                                                                                 .p-btn{
                                                                                                                   width:100%;padding:.85rem;
                                                                                                                     font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.2em;font-weight:700;
                                                                                                                       background:transparent;border:1px solid var(--g);color:var(--g);
                                                                                                                         cursor:none;transition:all .3s;text-transform:uppercase;
                                                                                                                           position:relative;overflow:hidden;margin-top:auto;
                                                                                                                           }
                                                                                                                           .p-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--g3),var(--g));transform:scaleX(0);transform-origin:left;transition:.35s;z-index:0;}
                                                                                                                           .p-btn .btn-txt{position:relative;z-index:1;transition:.3s;}
                                                                                                                           .p-btn:hover::before{transform:scaleX(1);}
                                                                                                                           .p-btn:hover .btn-txt{color:var(--black);}
                                                                                                                           .plan.hot .p-btn{border-color:var(--g2);color:var(--g2);}

                                                                                                                           /* ═══════════════════════════════════════
                                                                                                                              RULES SECTION — boxed panels
                                                                                                                              ═══════════════════════════════════════ */
                                                                                                                              .rules-sec{padding:7rem 0;}
                                                                                                                              .rules-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:3rem;}

                                                                                                                              .rule-box{
                                                                                                                                background:var(--d1);
                                                                                                                                  border:1px solid var(--border2);
                                                                                                                                    padding:2rem;
                                                                                                                                      position:relative;
                                                                                                                                        box-shadow:0 4px 20px rgba(0,0,0,.4);
                                                                                                                                        }
                                                                                                                                        .rule-box::before{content:'';position:absolute;top:-1px;left:-1px;width:18px;height:18px;border-top:2px solid var(--g);border-left:2px solid var(--g);}
                                                                                                                                        .rule-box::after{content:'';position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-bottom:2px solid var(--g);border-right:2px solid var(--g);}

                                                                                                                                        .rg-title{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.3em;color:var(--g);padding-bottom:.8rem;border-bottom:1px solid var(--border);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem;}
                                                                                                                                        .rg-title::before{content:'>';color:var(--g3);}
                                                                                                                                        .ri{display:flex;gap:.9rem;padding:.85rem 0;border-bottom:1px solid rgba(201,168,76,.05);}
                                                                                                                                        .ri:last-child{border-bottom:none;}
                                                                                                                                        .ri-ico{flex-shrink:0;font-size:.85rem;margin-top:.15rem;}
                                                                                                                                        .ri-ico.y{color:var(--green);}
                                                                                                                                        .ri-ico.n{color:var(--red);}
                                                                                                                                        .ri-ico.i{color:var(--g);}
                                                                                                                                        .ri-text{font-size:.8rem;color:var(--dim);line-height:1.8;}
                                                                                                                                        .ri-text strong{display:block;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:.05em;margin-bottom:.2rem;}

                                                                                                                                        /* PAYOUT */
                                                                                                                                        .payout{padding:7rem 0;background:var(--d1);}
                                                                                                                                        .payout-inner{display:grid;grid-template-columns:1.1fr 1fr;gap:1.5rem;align-items:start;margin-top:3rem;}
                                                                                                                                        .split-chart{
                                                                                                                                          background:var(--d2);
                                                                                                                                            border:1px solid var(--border2);
                                                                                                                                              padding:2rem;
                                                                                                                                                position:relative;
                                                                                                                                                  box-shadow:0 4px 20px rgba(0,0,0,.4);
                                                                                                                                                  }
                                                                                                                                                  .split-chart::before{content:'';position:absolute;top:-1px;left:-1px;width:18px;height:18px;border-top:2px solid var(--g);border-left:2px solid var(--g);}
                                                                                                                                                  .split-chart::after{content:'';position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-bottom:2px solid var(--g);border-right:2px solid var(--g);}
                                                                                                                                                  .split-title{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.3em;color:var(--dim);margin-bottom:1.8rem;text-transform:uppercase;}
                                                                                                                                                  .split-row{margin-bottom:1.4rem;}
                                                                                                                                                  .split-label{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:.68rem;margin-bottom:.5rem;}
                                                                                                                                                  .split-lname{color:var(--dim);}
                                                                                                                                                  .split-lpct{color:var(--g);font-weight:700;}
                                                                                                                                                  .split-track{height:26px;background:rgba(255,255,255,.04);border:1px solid var(--border);position:relative;overflow:hidden;}
                                                                                                                                                  .split-fill{height:100%;background:linear-gradient(to right,var(--g3),var(--g));position:relative;}
                                                                                                                                                  .split-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:2px;background:var(--g2);box-shadow:0 0 10px var(--g);}

                                                                                                                                                  .payout-list-box{
                                                                                                                                                    background:var(--d2);
                                                                                                                                                      border:1px solid var(--border2);
                                                                                                                                                        padding:2rem;
                                                                                                                                                          position:relative;
                                                                                                                                                            box-shadow:0 4px 20px rgba(0,0,0,.4);
                                                                                                                                                            }
